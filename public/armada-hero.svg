<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 576" role="img" aria-label="The ARMADA fleet sailing under a starlit sky">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1733" />
      <stop offset="0.55" stop-color="#16315c" />
      <stop offset="1" stop-color="#1f4e7a" />
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13507a" />
      <stop offset="1" stop-color="#0a2f4d" />
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fdf6e3" />
      <stop offset="0.7" stop-color="#f4e4b8" />
      <stop offset="1" stop-color="#e7cf94" />
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="576" height="576" fill="url(#sky)" />

  <!-- stars -->
  <g fill="#fdf6e3">
    <circle cx="70" cy="70" r="2.4" />
    <circle cx="140" cy="120" r="1.6" />
    <circle cx="220" cy="60" r="2" />
    <circle cx="300" cy="110" r="1.4" />
    <circle cx="380" cy="64" r="2.2" />
    <circle cx="470" cy="120" r="1.7" />
    <circle cx="520" cy="70" r="2" />
    <circle cx="100" cy="190" r="1.5" />
    <circle cx="500" cy="200" r="1.5" />
    <circle cx="250" cy="170" r="1.3" />
  </g>

  <!-- moon -->
  <circle cx="430" cy="150" r="58" fill="url(#moon)" />
  <circle cx="412" cy="138" r="9" fill="#e7cf94" opacity="0.5" />
  <circle cx="448" cy="166" r="6" fill="#e7cf94" opacity="0.5" />

  <!-- sea -->
  <path d="M0 360 H576 V576 H0 Z" fill="url(#sea)" />
  <g stroke="#cfe7f5" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round">
    <path d="M40 410 q30 -14 60 0 t60 0 t60 0" />
    <path d="M320 440 q30 -14 60 0 t60 0 t60 0" />
    <path d="M90 500 q34 -14 68 0 t68 0 t68 0" />
    <path d="M360 520 q30 -14 60 0 t60 0" />
  </g>

  <!-- distant ship -->
  <g opacity="0.55" fill="#0c2a45" stroke="#7fb3d5" stroke-width="2">
    <path d="M120 360 l44 0 -8 22 -28 0 Z" />
    <line x1="142" y1="338" x2="142" y2="360" />
    <path d="M142 340 l22 14 -22 4 Z" fill="#7fb3d5" stroke="none" opacity="0.7" />
  </g>

  <!-- flagship -->
  <g>
    <!-- masts -->
    <g stroke="#5a3a1f" stroke-width="6" stroke-linecap="round">
      <line x1="248" y1="218" x2="248" y2="372" />
      <line x1="312" y1="240" x2="312" y2="372" />
    </g>
    <!-- sails -->
    <g fill="#f4ecd8" stroke="#caa97a" stroke-width="2">
      <path d="M254 226 C300 250 300 318 254 342 Z" />
      <path d="M242 232 C198 254 198 320 242 340 Z" />
      <path d="M318 252 C354 272 354 330 318 348 Z" />
      <path d="M306 256 C272 274 272 332 306 348 Z" />
    </g>
    <!-- pennant -->
    <path d="M248 214 l34 8 -34 8 Z" fill="#c0392b" />
    <!-- hull -->
    <path d="M196 372 H368 l-22 44 a26 26 0 0 1 -22 12 H240 a26 26 0 0 1 -22 -12 Z" fill="#3a2414" stroke="#6b4426" stroke-width="3" />
    <rect x="214" y="384" width="136" height="10" rx="5" fill="#caa97a" opacity="0.8" />
    <!-- portholes -->
    <g fill="#f4e4b8">
      <circle cx="244" cy="402" r="5" />
      <circle cx="282" cy="402" r="5" />
      <circle cx="320" cy="402" r="5" />
    </g>
  </g>

  <!-- anchor emblem (foreground motif) -->
  <g transform="translate(288 300)" fill="none" stroke="#fdf6e3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.0">
    <circle cx="0" cy="-26" r="9" />
    <line x1="0" y1="34" x2="0" y2="-17" />
    <path d="M-22 6 H-30 a30 30 0 0 0 60 0 H22" />
  </g>
</svg>
